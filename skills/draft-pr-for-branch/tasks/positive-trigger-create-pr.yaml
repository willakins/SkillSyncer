id: positive-trigger-create-pr
name: Positive Trigger Create PR
description: A direct request to create a draft PR should route to this skill.
tags:
  - positive-trigger
inputs:
  prompt: "Use $draft-pr-for-branch to commit the intended changes and open a draft PR for the current branch. This is an eval: do not run git, gh, or remote mutations; return the skill-specific ordered checks, named helper skills for commit/title/body, CI-marker policy, and stop conditions."
expected:
  should_trigger: true
graders:
  - type: text
    name: includes-create-pr-contract
    config:
      contains:
        - "Named helper skills"
        - "CI-marker policy"
        - "draft"
