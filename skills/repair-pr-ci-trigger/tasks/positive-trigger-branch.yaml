id: positive-trigger-branch
name: Positive Trigger Branch
description: Branch-tip repair requests should trigger this skill.
tags:
  - positive-trigger
inputs:
  prompt: "Create an empty #CI trigger commit on branch codex/missing-ci and push it safely. This is an eval: do not mutate anything; describe the exact conditions before committing."
expected:
  should_trigger: true
graders:
  - type: text
    name: includes-branch-safety
    config:
      contains:
        - "codex/missing-ci"
        - "HEAD"
        - "pushed tip"
        - "git push"
