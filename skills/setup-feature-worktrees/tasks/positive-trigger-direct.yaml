id: positive-trigger-direct
name: Positive Trigger Direct
description: Direct skill invocation with planned branches should trigger worktree setup.
tags:
  - positive-trigger
inputs:
  prompt: "Use $setup-feature-worktrees for this existing branch plan: feature/import-copy, feature/export-copy, and feature/git-sync. Update main first, reuse the current worktree for feature/import-copy if it is clean, create extra worktrees for the others, and open VS Code. Routing eval only: do not run commands or edit files; summarize the exact setup workflow and output mapping you would produce."
expected:
  should_trigger: true
graders:
  - type: text
    name: includes-setup-contract
    config:
      contains:
        - "scripts/setup_worktrees.py"
        - "setup-worktree-database"
        - "feature/export-copy"
