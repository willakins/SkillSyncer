id: positive-trigger-selected-items
name: Positive Trigger Selected Items
description: Explicit selected review items should route through this skill.
tags:
  - positive-trigger
inputs:
  prompt: "Use $github-publish-review-items to publish selected review items A1, UI1, and L1 for repo acme/app PR #42 at reviewed commit abc123. This is an eval: do not run GitHub writes; return the head-SHA check, selected-ID-only rule, narrow publish skills, and ambiguity blockers."
expected:
  should_trigger: true
graders:
  - type: text
    name: includes-router-contract
    config:
      contains:
        - "head"
        - "selected"
        - "github-submit-review-decision"
        - "github-publish-pr-comment"
        - "github-publish-inline-review-comment"
