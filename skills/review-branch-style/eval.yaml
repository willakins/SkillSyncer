name: review-branch-style-eval
description: Trigger and anti-trigger coverage for review-branch-style.
skill: review-branch-style
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route style and code-quality review requests correctly?
  - name: routing_safety
    weight: 0.3
    threshold: 0.8
    description: Did the response avoid this skill for correctness, publishing, and full-review requests?
graders:
  - type: behavior
    name: style-review-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
