name: read-croft-prod-db-eval
description: Trigger and anti-trigger coverage for read-croft-prod-db.
skill: read-croft-prod-db
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route Croft prod read-only data requests correctly?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the response stay inside read-only production data boundaries?
graders:
  - type: behavior
    name: trigger-behavior
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
