id: positive-trigger-comment
name: Positive Trigger Comment
description: A direct request to submit a comment-only final review should route to this skill.
tags:
  - positive-trigger
inputs:
  prompt: "Use $github-submit-review-decision to submit a COMMENT review on repo acme/app PR #42 at reviewed commit abc123 with body `I left a non-blocking summary for the reviewer.` Eval only: do not call GitHub; return the skill-specific checks and submission boundary."
expected:
  should_trigger: true
graders:
  - type: text
    name: includes-comment-review-contract
    config:
      contains:
        - "COMMENT"
        - "abc123"
        - "review body"
        - "top-level PR conversation"
