name: review-branch-for-merge-eval
description: Trigger and anti-trigger coverage for review-branch-for-merge.
skill: review-branch-for-merge
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route full merge-readiness review requests correctly?
  - name: routing_safety
    weight: 0.3
    threshold: 0.8
    description: Did the response avoid this coordinator for narrower review or publication requests?
graders:
  - type: behavior
    name: merge-review-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
