name: review-branch-until-clean-eval
description: Trigger and anti-trigger coverage for review-branch-until-clean.
skill: review-branch-until-clean
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route end-to-end review-and-repair loops correctly?
  - name: routing_safety
    weight: 0.3
    threshold: 0.8
    description: Did the response avoid this coordinator for narrower workflows?
graders:
  - type: behavior
    name: review-until-clean-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
