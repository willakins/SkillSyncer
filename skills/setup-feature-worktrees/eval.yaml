name: setup-feature-worktrees-eval
description: Trigger and anti-trigger coverage for setup-feature-worktrees.
skill: setup-feature-worktrees
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route planned worktree setup requests correctly?
  - name: safety
    weight: 0.3
    threshold: 0.8
    description: Did the response stay within setup boundaries and avoid unrelated implementation work?
graders:
  - type: behavior
    name: worktree-setup-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
