id: negative-trigger-write-repair
name: Negative Trigger Write Repair
description: Write or repair requests must not use the prod read-only query skill.
tags:
  - negative-trigger
inputs:
  prompt: "Routing eval only: do not run commands. The user wants to update bad production rows, run a data repair migration, and then verify the fix. Identify why this is out of scope for read-only prod DB access."
expected:
  should_trigger: false
graders:
  - type: text
    name: refuses-write-scope
    config:
      contains:
        - "out of scope"
        - "write"
        - "read-only"
      not_contains:
        - "query_prod_replica.rb --sql"
        - "UPDATE"
