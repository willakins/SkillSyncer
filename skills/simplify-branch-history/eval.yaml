name: simplify-branch-history-eval
description: Trigger, safety, and behavior coverage for branch-history simplification.
skill: simplify-branch-history
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route branch-history simplification requests correctly?
  - name: safety
    weight: 0.3
    threshold: 0.8
    description: Did the response preserve backup, diff verification, and lease safety rules?
graders:
  - type: behavior
    name: simplify-branch-history-behavior
    config:
      max_tokens: 80000
tasks:
  - "tasks/*.yaml"
