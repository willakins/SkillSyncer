name: review-branch-ui-eval
description: Trigger and anti-trigger coverage for review-branch-ui.
skill: review-branch-ui
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route UI review requests correctly?
  - name: scope_control
    weight: 0.3
    threshold: 0.8
    description: Did the response avoid logic, style, CI, and publication work?
graders:
  - type: behavior
    name: ui-review-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
