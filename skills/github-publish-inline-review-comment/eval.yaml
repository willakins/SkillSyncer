name: github-publish-inline-review-comment-eval
description: Trigger and anti-trigger coverage for github-publish-inline-review-comment.
skill: github-publish-inline-review-comment
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route inline PR review comment requests correctly?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the response stay within the single-inline-comment boundary?
graders:
  - type: behavior
    name: trigger-behavior
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
