name: github-publish-review-items-eval
description: Trigger and anti-trigger coverage for github-publish-review-items.
skill: github-publish-review-items
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route selected review-item publication correctly?
  - name: safety
    weight: 0.3
    threshold: 0.8
    description: Did the response avoid publishing without selected IDs and a matching reviewed head?
graders:
  - type: behavior
    name: publish-review-items-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
