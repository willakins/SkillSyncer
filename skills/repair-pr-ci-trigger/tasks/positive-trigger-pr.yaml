id: positive-trigger-pr
name: Positive Trigger PR
description: Explicit PR repair requests should trigger this skill.
tags:
  - positive-trigger
inputs:
  prompt: "Use $repair-pr-ci-trigger to repair PR #123 so the latest pushed commit triggers CI. This is an eval: do not run commands; explain the safe checks and final command shape."
expected:
  should_trigger: true
graders:
  - type: text
    name: includes-safe-repair-contract
    config:
      contains:
        - "PR head"
        - "#CI"
        - "force-with-lease"
        - "clean"
