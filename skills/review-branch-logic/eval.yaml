name: review-branch-logic-eval
description: Trigger and anti-trigger coverage for review-branch-logic.
skill: review-branch-logic
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the response route correctness-review requests correctly?
  - name: focus
    weight: 0.3
    threshold: 0.8
    description: Did the response stay limited to actionable logic findings?
graders:
  - type: behavior
    name: logic-review-routing
    config:
      max_tokens: 50000
tasks:
  - "tasks/*.yaml"
